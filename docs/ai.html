<head>

    <style>
        :root{--bg:#06060a;--s1:#0c0c14;--s2:#18181b;--border:rgba(255,255,255,0.07);--txt:#a1a1aa;--white:#f4f4f5;--dim:#52525b;--purple:#8b5cf6;--purpled:rgba(139,92,246,0.12)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

        /* BG */
        .mesh{position:fixed;inset:0;pointer-events:none;z-index:0}
        .mesh i{position:absolute;border-radius:50%;filter:blur(120px);mix-blend-mode:screen;animation:m 25s ease-in-out infinite alternate}
        .mesh .m1{width:35vw;height:35vw;background:rgba(139,92,246,0.08);top:-10%;right:-5%;animation-delay:0s}
        .mesh .m2{width:30vw;height:30vw;background:rgba(59,130,246,0.06);bottom:-10%;left:-5%;animation-delay:-8s}
        @keyframes m{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-40px) scale(1.1)}}

        /* TOP BAR */
        .top{position:relative;z-index:10;background:rgba(6,6,10,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
        .top .back{background:var(--s2);color:var(--white);border:1px solid var(--border);padding:7px 16px;border-radius:10px;font-weight:600;cursor:pointer;font-size:0.8em;font-family:inherit;transition:all 0.3s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
        .top .back:hover{background:rgba(255,255,255,0.06)}
        .top .title{flex:1;text-align:center}
        .top .title b{color:var(--white);font-size:0.9em}
        .top .title small{color:var(--dim);font-size:0.72em;display:block;margin-top:1px}
        .top .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:bk 2s ease infinite}
        @keyframes bk{0%,100%{opacity:1}50%{opacity:0.3}}

        /* CHAT AREA */
        .chat{flex:1;overflow-y:auto;padding:20px;position:relative;z-index:1;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
        .chat::-webkit-scrollbar{width:4px}
        .chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

        /* WELCOME */
        .welcome{text-align:center;padding:40px 20px;max-width:600px;margin:0 auto}
        .welcome .icon{font-size:3em;margin-bottom:16px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .welcome h2{color:var(--white);font-size:1.5em;font-weight:800;margin-bottom:8px}
        .welcome p{color:var(--dim);font-size:0.9em;line-height:1.6;margin-bottom:24px}
        .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .chip{background:var(--s2);border:1px solid var(--border);color:var(--txt);padding:10px 16px;border-radius:12px;font-size:0.8em;font-weight:600;cursor:pointer;transition:all 0.3s;font-family:inherit;text-align:left;line-height:1.3}
        .chip:hover{border-color:rgba(139,92,246,0.3);background:var(--purpled);color:var(--white);transform:translateY(-2px)}

        /* MESSAGES */
        .msg{max-width:680px;margin:0 auto 16px;display:flex;gap:10px;animation:msgIn 0.4s cubic-bezier(0.16,1,0.3,1)}
        @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
        .msg.user{flex-direction:row-reverse}
        .msg .avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.85em;flex-shrink:0;font-weight:700}
        .msg.ai .avatar{background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff}
        .msg.user .avatar{background:var(--s2);border:1px solid var(--border);color:var(--txt)}
        .msg .bubble{padding:14px 18px;border-radius:16px;font-size:0.88em;line-height:1.7;max-width:85%}
        .msg.ai .bubble{background:var(--s1);border:1px solid var(--border);color:var(--txt);border-top-left-radius:4px}
        .msg.user .bubble{background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);color:#d4d4d8;border-top-right-radius:4px}
        .msg .bubble h1,.msg .bubble h2,.msg .bubble h3{color:var(--white);margin:12px 0 6px;font-size:1.05em}
        .msg .bubble h1:first-child,.msg .bubble h2:first-child,.msg .bubble h3:first-child{margin-top:0}
        .msg .bubble strong{color:var(--white)}
        .msg .bubble code{background:var(--s2);padding:2px 6px;border-radius:4px;font-size:0.88em}
        .msg .bubble table{width:100%;border-collapse:collapse;margin:10px 0;font-size:0.88em}
        .msg .bubble th{background:var(--s2);color:var(--white);padding:8px;text-align:left;font-weight:600}
        .msg .bubble td{padding:8px;border-bottom:1px solid var(--border)}
        .msg .bubble ul,.msg .bubble ol{padding-left:20px;margin:6px 0}
        .msg .bubble li{margin:3px 0}
        .msg .bubble blockquote{border-left:3px solid var(--purple);padding:8px 14px;margin:8px 0;background:var(--s2);border-radius:0 8px 8px 0}
        .msg .bubble a{color:#93c5fd}
        .msg .bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}

        /* TYPING INDICATOR */
        .typing{display:flex;gap:4px;padding:8px 0}
        .typing span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:tp 1.4s ease infinite}
        .typing span:nth-child(2){animation-delay:0.2s}
        .typing span:nth-child(3){animation-delay:0.4s}
        @keyframes tp{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-8px);opacity:1}}

        /* INPUT */
        .input-area{position:relative;z-index:10;background:rgba(6,6,10,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
        .input-wrap{max-width:700px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
        .input-wrap textarea{flex:1;background:var(--s1);border:1px solid var(--border);color:var(--white);padding:12px 16px;border-radius:14px;font-size:0.9em;font-family:inherit;resize:none;outline:none;transition:border-color 0.3s;min-height:46px;max-height:120px;line-height:1.4}
        .input-wrap textarea:focus{border-color:rgba(139,92,246,0.4)}
        .input-wrap textarea::placeholder{color:var(--dim)}
        .send{background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;border:none;width:46px;height:46px;border-radius:14px;cursor:pointer;font-size:1.1em;transition:all 0.3s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .send:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(124,58,237,0.4)}
        .send:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}
        .hint{text-align:center;color:var(--dim);font-size:0.7em;margin-top:8px;max-width:700px;margin-left:auto;margin-right:auto}

            .welcome h2{font-size:1.2em}
            .chips{gap:6px}

// OSI MODEL
osi: `## OSI Model - Simple Explanation

The OSI Model has **7 layers** (remember: **P**lease **D**o **N**ot **T**hrow **S**ausage **P**izza **A**way):

| Layer | Name | Function | Example |
|-------|------|----------|---------|
| 7 | **Application** | User interface | HTTP, FTP, SMTP |
| 6 | **Presentation** | Data format/encryption | SSL, JPEG, ASCII |
| 5 | **Session** | Session management | NetBIOS, RPC |
| 4 | **Transport** | End-to-end delivery | TCP, UDP |
| 3 | **Network** | Routing/IP addressing | IP, Router, ICMP |
| 2 | **Data Link** | Frames, MAC address | Switch, Ethernet |
| 1 | **Physical** | Bits, cables, signals | Hub, Cable, NIC |

**Key for exam:**
- **Router** = Layer 3 (Network)
- **Switch** = Layer 2 (Data Link)
- **Hub** = Layer 1 (Physical)
- **TCP** = Layer 4 (reliable, connection-oriented)
- **UDP** = Layer 4 (unreliable, connectionless)`,

tcp_udp: `## TCP vs UDP

| Feature | TCP | UDP |
|---------|-----|-----|
| **Full form** | Transmission Control Protocol | User Datagram Protocol |
| **Connection** | Connection-oriented | Connectionless |
| **Reliability** | Reliable (guarantees delivery) | Unreliable (no guarantee) |
| **Speed** | Slower | Faster |
| **Order** | Maintains order | No order guarantee |
| **Error checking** | Yes + retransmission | Basic checksum only |
| **Used for** | Web (HTTP), Email, FTP | Video streaming, DNS, Gaming |
| **Port examples** | 80 (HTTP), 443 (HTTPS), 25 (SMTP) | 53 (DNS), 67 (DHCP) |

**Exam tip:** If question says "connectionless" or "no guarantee" → answer is **UDP**`,

function findAnswer(q) {
    const ql = q.toLowerCase();

    // Check rules
    for (const rule of RULES) {
        const matchCount = rule.k.filter(k => ql.includes(k)).length;
        if (matchCount >= 1) {
            // Check for MCQ request
            if ((ql.includes('mcq') || ql.includes('question') || ql.includes('quiz') || ql.includes('practice') || ql.includes('પ્રશ્ન')) && rule.r === 'surat_history') {
                return KB.surat_mcq;
            }
            return KB[rule.r];
        }
    }

    // Generic responses
    if (ql.includes('hello') || ql.includes('hi') || ql.includes('hey') || ql.includes('namaste')) {
        return `Hello! 👋 I'm your SMC Exam AI Assistant. I can help you with:\n\n- **Exam syllabus** (Computer Supervisor & Clerk)\n- **Surat history** & Gujarat GK\n- **Practice MCQs** in English & Gujarati\n- **How to apply** (step-by-step)\n- **Formulas, shortcuts, full forms**\n- **Exam strategy & tips**\n\nJust ask your question!`;
    }

    if (ql.includes('thank') || ql.includes('thanks') || ql.includes('dhanyavad')) {
        return `You're welcome! All the best for your exam! 🎯\n\nRemember:\n- Practice daily\n- Focus on high-weightage topics\n- Take mock tests\n- Apply before 15 April 2026`;
    }

    if (ql.includes('salary') || ql.includes('pay') || ql.includes('income')) {
        return `## Salary Details\n\n| Post | First 3 Years | Pay Matrix |\n|------|--------------|------------|\n| **Clerk** | ₹16,500/month | ₹19,900 - ₹63,200 (Level 2) |\n| **Computer Supervisor** | ₹18,500/month | ₹39,900 - ₹1,26,600 (Level 7) |\n\nPlus DA + HRA + other allowances. Salary increases with experience.`;
    }

    if (ql.includes('age') || ql.includes('eligib') || ql.includes('qualification')) {
        return `## Eligibility\n\n### Clerk:\n- **Qualification:** Graduate + CCC\n- **Age:** 18-35 (General), 38 (OBC), 40 (SC/ST), 45 (PwD)\n\n### Computer Supervisor:\n- **Qualification:** BCA/B.Sc(IT)/BE(CS/IT) + CCC\n- **Age:** 18-35 (General), relaxation for reserved`;
    }

    if (ql.includes('tip') || ql.includes('strategy') || ql.includes('how to crack') || ql.includes('prepare')) {
        return `## Exam Strategy\n\n### Time Management (120 min for 100 Q):\n1. **First 40 min:** Easy subjects (Gujarati/Computer)\n2. **Next 35 min:** GK + English\n3. **Next 30 min:** Maths + Reasoning\n4. **Last 15 min:** Review\n\n### Golden Rules:\n- Never spend > 2 min on one question\n- Do easy questions first\n- For Clerk: Don't guess wildly (-0.25)\n- For CS: Attempt ALL (no negative)\n- Practice at least 3 mock tests\n- Focus on Surat/Gujarat GK (5-10 guaranteed questions)`;
    }

    if (ql.includes('typing') || ql.includes('wpm') || ql.includes('inscript')) {
        return `## Typing Test Info\n\n| Exam | Gujarati | English | Duration |\n|------|----------|---------|----------|\n| Clerk | 25 WPM | 30 WPM | 10 min each |\n| CS | 25 WPM | - | 10 min |\n\n### Tips:\n- Use **InScript** layout (govt standard)\n- Practice 30 min daily for 30 days\n- **Accuracy > Speed** (errors count against you)\n- Learn home row first: ASDF JKL;\n- F and J keys have bumps - find without looking\n- Free practice: TypingClub, Keybr.com, 10FastFingers`;
    }

    if (ql.includes('cutoff') || ql.includes('cut off') || ql.includes('passing')) {
        return `## Expected Cutoffs (Clerk Exam)\n\n| Category | Approx. Range |\n|----------|---------------|\n| General | 55-65 marks |\n| EWS | 50-60 marks |\n| OBC | 45-55 marks |\n| SC | 35-45 marks |\n| ST | 30-40 marks |\n\n> These are estimates based on previous patterns. Actual cutoffs depend on difficulty & number of candidates.`;
    }

    // Default
    return `I can help you with these topics:\n\n- **"Surat history"** - Complete Surat facts & MCQs\n- **"Computer Supervisor syllabus"** - Full syllabus\n- **"Clerk exam pattern"** - Pattern & strategy\n- **"How to apply"** - Step-by-step form guide\n- **"Keyboard shortcuts"** - Important shortcuts\n- **"OSI model"** - Explained simply\n- **"TCP vs UDP"** - Comparison\n- **"Port numbers"** - Important ports\n- **"Full forms"** - All abbreviations\n- **"Gujarat GK"** - Key facts\n- **"Constitution"** - Articles & amendments\n- **"Math formulas"** - All important formulas\n- **"ગુજરાતી MCQs"** - Gujarati practice\n- **"Salary"** - Pay details\n- **"Typing test"** - WPM requirements\n- **"Cutoff"** - Expected cutoffs\n- **"Exam tips"** - Strategy\n\nTry asking one of these!`;
}

// ===== CHAT ENGINE =====
const chat = document.getElementById('chat');
let history = [];

function addMsg(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'ai' ? '✦' : '→';
    div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${role === 'ai' ? marked.parse(text) : escHtml(text)}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-msg';
    div.innerHTML = `<div class="avatar">✦</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
}

function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function ask(text) {
    document.getElementById('inp').value = '';
    send(text);
}

function send(forcedText) {
    const inp = document.getElementById('inp');
    const text = forcedText || inp.value.trim();
    if (!text) return;
    inp.value = '';
    inp.style.height = 'auto';

    addMsg('user', text);

    // Disable send
    document.getElementById('sbtn').disabled = true;

    // Show typing
    addTyping();

    // Simulate thinking delay
    const delay = 400 + Math.random() * 800;
    setTimeout(() => {
        removeTyping();
        const answer = findAnswer(text);
        addMsg('ai', answer);
        document.getElementById('sbtn').disabled = false;
    }, delay);
}

// Auto-resize textarea
const inp = document.getElementById('inp');
inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
});
</script>
