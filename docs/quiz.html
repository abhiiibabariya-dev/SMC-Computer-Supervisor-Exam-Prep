<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<title>Practice Quizzes — SMC Exam Prep 2026</title>
<meta name="description" content="Subject-wise SMC 2026 practice quizzes (GK, Gujarat, Reasoning, Maths, English, Computer) in English / ગુજરાતી / हिंदी with scores, weak-area analysis and leaderboard.">
<style>
  :root{--bg:#0b0f1a;--card:#111113;--line:rgba(255,255,255,.09);--ind:#6366f1;--ind2:#818cf8;--mut:#a1a1aa;--ok:#22c55e;--bad:#ef4444}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#e5e7eb;font-family:"Plus Jakarta Sans",system-ui,-apple-system,sans-serif;min-height:100vh;padding:64px 16px 40px}
  .wrap{max-width:640px;margin:0 auto}
  .top{text-align:center;margin-bottom:18px}
  .top h1{font-size:1.7em;font-weight:800;margin:0 0 6px;color:#fafafa}
  .top p{color:var(--mut);margin:0;font-size:.95em}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:18px}
  .subs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sub{display:flex;flex-direction:column;align-items:flex-start;gap:3px;background:#18181b;border:1px solid var(--line);border-radius:14px;padding:15px;color:#fafafa;font-weight:700;cursor:pointer;font-family:inherit;font-size:1em;text-align:left;transition:.15s}
  .sub:hover{border-color:var(--ind);transform:translateY(-2px)}
  .sub small{color:var(--mut);font-weight:600;font-size:.72em}
  .sub .em{font-size:1.4em}
  .pill{display:inline-block;font-size:.72em;font-weight:700;color:var(--ind2);background:rgba(99,102,241,.13);padding:4px 11px;border-radius:50px;margin-bottom:14px}
  .qtext{font-size:1.18em;font-weight:700;color:#fafafa;line-height:1.5;margin:0 0 18px}
  .opt{display:block;width:100%;text-align:left;background:#18181b;border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:#e5e7eb;font-size:1em;font-family:inherit;cursor:pointer;margin-bottom:10px;transition:.15s;line-height:1.4}
  .opt:hover{border-color:var(--ind)}
  .opt.ok{border-color:var(--ok);background:rgba(34,197,94,.13)}
  .opt.bad{border-color:var(--bad);background:rgba(239,68,68,.13)}
  .opt[disabled]{cursor:default}
  .btn{width:100%;background:linear-gradient(135deg,var(--ind),var(--ind2));color:#fff;border:0;border-radius:12px;padding:15px;font-size:1.02em;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:#e5e7eb}
  .bar{height:6px;background:#1e293b;border-radius:50px;overflow:hidden;margin-bottom:18px}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ind),var(--ind2));width:0;transition:width .3s}
  .meta{display:flex;justify-content:space-between;color:var(--mut);font-size:.82em;margin-bottom:10px}
  .exp{font-size:.86em;color:#cbd5e1;background:#0f1626;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:6px;line-height:1.5}
  .scorebig{font-size:3.2em;font-weight:800;color:#fafafa;text-align:center;margin:6px 0}
  .scoresub{text-align:center;color:var(--mut);margin-bottom:16px}
  .stat{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:.9em}
  .stat:last-child{border-bottom:0}
  .wbar{height:8px;width:120px;background:#1e293b;border-radius:50px;overflow:hidden}
  .wbar i{display:block;height:100%;border-radius:50px}
  .sec-h{font-size:.78em;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin:18px 0 8px}
  .nav{text-align:center;margin-top:20px}
  .nav a{color:var(--ind2);text-decoration:none;font-size:.88em;margin:0 8px}
  .hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1 data-i18n="qz_title">Practice Quizzes</h1>
    <p data-i18n="qz_pick">Choose a subject</p>
  </div>

  <!-- PICKER -->
  <div id="picker">
    <div class="card">
      <div class="subs" id="subs"></div>
    </div>
    <div class="card" id="statsCard">
      <div class="sec-h" data-i18n="qz_weak">Your weak areas</div>
      <div id="weak"></div>
      <div class="sec-h" data-i18n="qz_history">Recent attempts</div>
      <div id="history"></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="card hide" id="quiz">
    <div class="bar"><i id="prog"></i></div>
    <div class="meta"><span id="qcount"></span><span id="qtimer">0s</span></div>
    <p class="qtext" id="qtext"></p>
    <div id="opts"></div>
    <div class="exp hide" id="exp"></div>
    <button class="btn hide" id="nextBtn"></button>
  </div>

  <!-- RESULT -->
  <div class="card hide" id="result">
    <div class="scorebig" id="scoreBig">0/10</div>
    <div class="scoresub" id="scoreSub"></div>
    <button class="btn" id="againBtn" data-i18n="play_again">Play again</button>
    <a class="btn ghost" href="leaderboard.html" style="display:block;text-align:center;text-decoration:none;margin-top:10px" data-i18n="leaderboard">Leaderboard</a>
  </div>

  <div class="nav">
    <a href="index.html" data-i18n="home">Home</a>·
    <a href="daily-quiz.html" data-i18n="daily_quiz">Daily Quiz</a>·
    <a href="leaderboard.html" data-i18n="leaderboard">Leaderboard</a>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="mcq-bank.js"></script>
<script src="i18n.js"></script>
<script>
(function(){
  "use strict";
  var FB=window.SMC_FIREBASE_URL||'';
  var BANK=(window.SMC_MCQS||[]);
  var SUBS=[['GK','🌍'],['GJ','🏛️'],['REASON','🧩'],['QUANT','🔢'],['ENG','🔤'],['COMP','💻']];
  var $=function(id){return document.getElementById(id);};
  function L(){return (window.smcLang?window.smcLang():'en');}
  function T(k){return (window.smcT?window.smcT(k):k);}

  var QS=[], cur=0, answers=[], subj='', t0=0, timer=null;

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

  function renderPicker(){
    var box=$('subs'); box.innerHTML='';
    SUBS.forEach(function(s){
      var n=BANK.filter(function(q){return q.subj===s[0];}).length;
      var b=document.createElement('button'); b.className='sub';
      b.innerHTML='<span class="em">'+s[1]+'</span><span>'+(T('s_'+s[0])||s[0])+'</span><small>'+n+' Q</small>';
      b.addEventListener('click',function(){ if(n)start(s[0]); });
      if(!n)b.style.opacity=.4;
      box.appendChild(b);
    });
    renderStats();
  }

  function start(s){
    subj=s;
    QS=shuffle(BANK.filter(function(q){return q.subj===s;}).slice()).slice(0,10);
    cur=0; answers=[];
    $('picker').classList.add('hide'); $('result').classList.add('hide'); $('quiz').classList.remove('hide');
    t0=Date.now(); clearInterval(timer);
    timer=setInterval(function(){ $('qtimer').textContent=Math.round((Date.now()-t0)/1000)+'s'; },1000);
    showQ();
  }

  function showQ(){
    var q=QS[cur];
    $('prog').style.width=(cur/QS.length*100)+'%';
    $('qcount').textContent=T('q_of')+' '+(cur+1)+' '+T('of')+' '+QS.length+' · '+(T('s_'+subj)||subj);
    $('qtext').textContent=q.q[L()]||q.q.en;
    var box=$('opts'); box.innerHTML='';
    var opts=q.o[L()]||q.o.en, picked=answers[cur];
    opts.forEach(function(txt,i){
      var b=document.createElement('button'); b.className='opt'; b.textContent=txt;
      if(picked!=null){ b.disabled=true; if(i===q.a)b.classList.add('ok'); if(i===picked&&picked!==q.a)b.classList.add('bad'); }
      b.addEventListener('click',function(){ if(answers[cur]!=null)return; answers[cur]=i; showQ(); });
      box.appendChild(b);
    });
    var exp=$('exp');
    if(picked!=null){ exp.classList.remove('hide'); exp.textContent='💡 '+((q.exp&&(q.exp[L()]||q.exp.en))||''); $('nextBtn').classList.remove('hide'); }
    else { exp.classList.add('hide'); $('nextBtn').classList.add('hide'); }
    $('nextBtn').textContent=(cur===QS.length-1)?T('dq_finish'):T('dq_next');
  }

  function score(){var s=0;for(var i=0;i<QS.length;i++)if(answers[i]===QS[i].a)s++;return s;}

  function finish(){
    clearInterval(timer);
    var sc=score(), secs=Math.round((Date.now()-t0)/1000);
    $('quiz').classList.add('hide'); $('result').classList.remove('hide');
    $('scoreBig').textContent=sc+'/'+QS.length;
    $('scoreSub').textContent=(T('s_'+subj)||subj)+' · '+T('correct')+': '+sc+' · '+secs+'s';
    saveHistory(subj,sc,QS.length,secs);
    postLeaderboard(subj,sc,QS.length,secs);
  }

  // ---- history / weak areas ----
  function hist(){try{return JSON.parse(localStorage.getItem('smc_quiz_history')||'[]');}catch(e){return[];}}
  function saveHistory(s,sc,tot,secs){
    var h=hist(); h.unshift({subj:s,score:sc,total:tot,secs:secs,t:new Date().toISOString()});
    h=h.slice(0,50); try{localStorage.setItem('smc_quiz_history',JSON.stringify(h));}catch(e){}
  }
  function renderStats(){
    var h=hist();
    if(!h.length){ $('weak').innerHTML='<div style="color:var(--mut);font-size:.86em" data-i18n="qz_none">'+T('qz_none')+'</div>'; $('history').innerHTML=''; return; }
    // avg % per subject
    var agg={}; h.forEach(function(r){ agg[r.subj]=agg[r.subj]||{s:0,t:0}; agg[r.subj].s+=r.score; agg[r.subj].t+=r.total; });
    var rows=Object.keys(agg).map(function(k){return {subj:k,p:Math.round(agg[k].s/agg[k].t*100)};}).sort(function(a,b){return a.p-b.p;});
    $('weak').innerHTML=rows.map(function(r){
      var col=r.p<50?'#ef4444':r.p<75?'#f59e0b':'#22c55e';
      return '<div class="stat"><span>'+(T('s_'+r.subj)||r.subj)+'</span><span style="display:flex;align-items:center;gap:8px"><span class="wbar"><i style="width:'+r.p+'%;background:'+col+'"></i></span><b style="color:'+col+'">'+r.p+'%</b></span></div>';
    }).join('');
    $('history').innerHTML=h.slice(0,6).map(function(r){
      var d=new Date(r.t).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      return '<div class="stat"><span>'+(T('s_'+r.subj)||r.subj)+' <small style="color:var(--mut)">'+d+'</small></span><b>'+r.score+'/'+r.total+'</b></div>';
    }).join('');
  }

  function postLeaderboard(s,sc,tot,secs){
    if(!FB)return;
    var u={}; try{u=JSON.parse(localStorage.getItem('smc_user')||'{}');}catch(e){}
    var rec={name:(u.name||'Anonymous'),mobile:(u.mobile||''),subj:s,score:sc,total:tot,secs:secs,t:new Date().toISOString()};
    try{fetch(FB+'/leaderboard.json',{method:'POST',body:JSON.stringify(rec),headers:{'Content-Type':'application/json'}}).catch(function(){});}catch(e){}
  }

  // ---- wire ----
  if(BANK.length===0){ $('subs').innerHTML='<div style="grid-column:1/3;color:var(--mut);text-align:center">Questions loading… refresh in a moment.</div>'; }
  renderPicker();
  $('nextBtn').addEventListener('click',function(){ if(cur<QS.length-1){cur++;showQ();}else{finish();} });
  $('againBtn').addEventListener('click',function(){ $('result').classList.add('hide'); $('picker').classList.remove('hide'); renderPicker(); });
  window.addEventListener('smc-lang',function(){
    if(!$('quiz').classList.contains('hide'))showQ();
    else if(!$('picker').classList.contains('hide'))renderPicker();
  });
})();
</script>
<script src="gate.js"></script>
<script src="tracker.js"></script>
<script src="share.js"></script>
<script src="enhance.js"></script>
<script src="growth.js"></script>
<script src="pwa.js" defer></script>
</body>
</html>
