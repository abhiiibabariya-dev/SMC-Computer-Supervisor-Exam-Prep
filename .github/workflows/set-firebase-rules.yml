name: Set Firebase Security Rules

# Installs append-only security rules on the Realtime Database so the site can
# WRITE new visits / clicks / leads / security events again, while public READS
# stay blocked. The daily report reads with the admin FIREBASE_SECRET, which
# bypasses these rules, so reporting is unaffected.
#
# Rule model (per collection):
#   "$id": { ".write": "!data.exists()" }
#     → anyone may CREATE a new push-id child (tracker.js / gate.js use POST),
#       but nobody may overwrite or delete an existing record (tamper-proof).
#   ".read": false at the root → no anonymous reads of any data.
#
# Run manually:  Actions → "Set Firebase Security Rules" → Run workflow.
# Requires the existing repo secret FIREBASE_SECRET (legacy DB secret).

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FIREBASE_URL: 'https://smc-exam-prep-38d22-default-rtdb.asia-southeast1.firebasedatabase.app'

jobs:
  set-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret
        env:
          FB_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          if [ -z "$FB_SECRET" ]; then
            echo "::error::FIREBASE_SECRET is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Write rules file
        run: |
          cat > rules.json <<'JSON'
          {
            "rules": {
              ".read": false,
              ".write": false,
              "_healthcheck": { ".read": false, ".write": true },
              "visits":      { "$id": { ".write": "!data.exists()" } },
              "clicks":      { "$id": { ".write": "!data.exists()" } },
              "leads":       { "$id": { ".write": "!data.exists()" } },
              "security":    { "$id": { ".write": "!data.exists()" } },
              "quizscores":  { "$id": { ".write": "!data.exists()" } },
              "leaderboard": { ".read": true, "$id": { ".write": "!data.exists()" } }
            }
          }
          JSON
          echo "Rules to install:"; cat rules.json

      - name: Install rules on Realtime Database
        env:
          FB_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          set -e
          HTTP=$(curl -s -o resp.txt -w '%{http_code}' \
            -X PUT "${FIREBASE_URL}/.settings/rules.json?auth=${FB_SECRET}" \
            -H 'Content-Type: application/json' \
            --data-binary @rules.json)
          echo "HTTP $HTTP"; cat resp.txt; echo
          if [ "$HTTP" != "200" ]; then
            echo "::error::Failed to install rules (HTTP $HTTP). The FIREBASE_SECRET may lack admin rights or be malformed."
            exit 1
          fi
          echo "✅ Security rules installed."

      - name: Verify (write should succeed, read should be denied)
        run: |
          set -e
          # Probe writes go to a throwaway /_healthcheck node so they never pollute
          # the real visits/leads/security collections shown in the daily report.
          echo "→ Anonymous WRITE to /_healthcheck (expect success):"
          W=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "${FIREBASE_URL}/_healthcheck.json" \
            -H 'Content-Type: application/json' \
            -d '{"check":"rules-verify"}')
          echo "   HTTP $W"
          echo "→ Anonymous READ of /_healthcheck (expect 401):"
          R=$(curl -s -o /dev/null -w '%{http_code}' "${FIREBASE_URL}/_healthcheck.json")
          echo "   HTTP $R"
          if [ "$W" = "200" ] && [ "$R" = "401" ]; then
            echo "✅ Writes restored, reads still private."
          else
            echo "::warning::Unexpected result (write=$W, read=$R). Review the rules."
          fi

      - name: Purge diagnostic / test records
        env:
          FB_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          set -e
          # Admin auth bypasses rules → read each collection, delete only records that
          # carry a known diagnostic marker, leaving all real visitor data untouched.
          curl -s -X DELETE "${FIREBASE_URL}/_healthcheck.json?auth=${FB_SECRET}" -o /dev/null || true
          for coll in leads security visits clicks leaderboard quizscores; do
            curl -fsS "${FIREBASE_URL}/${coll}.json?auth=${FB_SECRET}" -o c.json || echo '{}' > c.json
            [ -s c.json ] || echo '{}' > c.json
            keys=$(jq -r 'to_entries[]? | select(
                      ((.value.ref // "")        | test("claude-verify|diagnostic"; "i")) or
                      ((.value.src // "")        | test("set-firebase-rules|diagnostic"; "i")) or
                      ((.value.name // "")       | test("Diagnostic Test"; "i")) or
                      (((.value.name // "") == "Test") and ((.value.mobile // "") == "")) or
                      ((.value.localTime // "")  | test("workflow-verify"; "i")) or
                      ((.value.pg // "")         | test("^/diagnostic$"; "i"))
                    ) | .key' c.json 2>/dev/null || true)
            for k in $keys; do
              echo "  deleting ${coll}/${k}"
              curl -s -X DELETE "${FIREBASE_URL}/${coll}/${k}.json?auth=${FB_SECRET}" -o /dev/null || true
            done
          done
          echo "✅ Diagnostic records purged (real visitor data untouched)."
