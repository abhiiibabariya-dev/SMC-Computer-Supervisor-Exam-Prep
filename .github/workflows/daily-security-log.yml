name: Daily Security & Activity Log

# Sends a daily site activity / security summary to the owner's email.
#
# ONE-TIME SETUP (required for the email step to work):
#   In the GitHub repo:  Settings -> Secrets and variables -> Actions -> New repository secret
#     1) MAIL_USERNAME    = the Gmail address you send FROM (e.g. abhiiibabariya@gmail.com)
#     2) MAIL_PASSWORD    = a Gmail "App Password" (NOT your normal password).
#          Create it at: https://myaccount.google.com/apppasswords  (needs 2-Step Verification ON)
#     3) FIREBASE_SECRET  = a Firebase Realtime DB auth token, so the report can READ your data.
#          Get it: Firebase console -> Project Settings -> Service accounts -> Database secrets
#          (or generate a token). Your DB currently blocks anonymous reads (good!), so without
#          this secret the report will show 0 visits.
#   The report is always delivered to: abhiiibabariya@gmail.com (see TO_EMAIL below).
#
#   OPTIONAL (to add a Google Analytics GA4 panel to the email):
#     4) GA_PROPERTY_ID = numeric GA4 property id (GA Admin -> Property Settings -> PROPERTY ID;
#          this is NOT the G-XXXX measurement id).
#     5) GA_SA_KEY       = full JSON of a Google Cloud service-account key that has Viewer access
#          to the GA4 property, with the "Google Analytics Data API" enabled. If either secret is
#          missing the GA section is simply omitted (everything else still works).
#
# Until MAIL_* secrets are added, the workflow still runs and builds the report,
# but the send-email step is skipped (so it won't fail noisily every day).

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours (full activity + security report)
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FIREBASE_URL: 'https://smc-exam-prep-38d22-default-rtdb.asia-southeast1.firebasedatabase.app'
  TO_EMAIL: 'abhiiibabariya@gmail.com'

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for GA report script)
        uses: actions/checkout@v4

      - name: Fetch site data from Firebase
        env:
          FB_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          set -e
          AUTH=""
          [ -n "$FB_SECRET" ] && AUTH="?auth=${FB_SECRET}"
          echo "Fetching visits, clicks & security log (auth: $([ -n "$FB_SECRET" ] && echo yes || echo no))..."
          curl -fsS "${FIREBASE_URL}/visits.json${AUTH}"   -o visits.json   || echo 'null' > visits.json
          curl -fsS "${FIREBASE_URL}/clicks.json${AUTH}"   -o clicks.json   || echo 'null' > clicks.json
          curl -fsS "${FIREBASE_URL}/security.json${AUTH}" -o security.json || echo 'null' > security.json
          # Normalise empty/null responses to empty objects
          for f in visits.json clicks.json security.json; do
            [ -s "$f" ] || echo '{}' > "$f"
            if [ "$(cat "$f")" = "null" ]; then echo '{}' > "$f"; fi
          done

      - name: Fetch Google Analytics (GA4)
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_SA_KEY: ${{ secrets.GA_SA_KEY }}
        run: |
          if [ -z "$GA_PROPERTY_ID" ] || [ -z "$GA_SA_KEY" ]; then
            echo "GA4 secrets (GA_PROPERTY_ID / GA_SA_KEY) not set — skipping Google Analytics section."
            exit 0
          fi
          printf '%s' "$GA_SA_KEY" > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS="$PWD/sa.json"
          python -m pip install --quiet --disable-pip-version-check google-analytics-data
          python .github/scripts/ga_report.py || echo "::warning::GA4 step failed (non-fatal)."
          rm -f sa.json

      - name: Build summary report
        id: report
        env:
          FB_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          set -e
          DATE_IST=$(TZ='Asia/Kolkata' date '+%d %B %Y, %I:%M %p')
          CUTOFF=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%S')

          # ---- Normalise visit records ----
          # The DB holds 3 historic schemas (verbose deviceModel/browser/page/timestamp,
          # compact dev/br/pg/t, and duration-only update beacons). Collapse them all into
          # one canonical shape so every downstream jq just works, drop the update beacons,
          # and resolve a real device label so nothing ever shows as "Unknown".
          jq '[ .[]?
            | select(.update != true)
            | . + {
                t:  (.t // .timestamp // ""),
                lt: (.lt // .localTime // .t // .timestamp // "-"),
                os: (.os // "—"),
                br: (.br // .browser // "—"),
                pg: (.pg // .page // "—"),
                net:(.net // (.connection.type) // "—"),
                ref:(.ref // .referrer // "Direct"),
                mob:(if (.mob != null) then .mob elif (.deviceType != null) then (.deviceType == "Mobile") else false end),
                dev:( (.dev // .deviceModel // "") as $d
                      | if ($d == "" or ($d|ascii_downcase|test("unknown")))
                        then ( if ((.mob == true) or (.deviceType == "Mobile"))
                               then ( if ((.os // "")|test("Android";"i")) then "Android Phone"
                                      elif ((.os // "")|test("iOS|iPhone";"i")) then "iPhone"
                                      else "Mobile Device" end )
                               else ( if ((.os // "")|test("Windows";"i")) then "Windows PC"
                                      elif ((.os // "")|test("Mac";"i")) then "Mac"
                                      elif ((.os // "")|test("Linux";"i")) then "Linux PC"
                                      else "Desktop" end ) end )
                        else $d end )
              } ]' visits.json > visits_norm.json && mv visits_norm.json visits.json

          # ---- Activity metrics ----
          TOTAL_VISITS=$(jq '[.[]?] | length' visits.json)
          TOTAL_CLICKS=$(jq '[.[]?] | length' clicks.json)
          LAST24=$(jq --arg c "$CUTOFF" '[.[]? | select((.t // "") > $c)] | length' visits.json)
          UNIQ_DEV=$(jq '[.[]? | .dev] | map(select(.!=null)) | unique | length' visits.json)
          MOBILE=$(jq '[.[]? | select(.mob==true)] | length' visits.json)

          # ---- Security metrics ----
          SEC_TOTAL=$(jq '[.[]?] | length' security.json)
          SEC_24=$(jq --arg c "$CUTOFF" '[.[]? | select((.time // "") > $c)] | length' security.json)
          SEC_WARN=$(jq '[.[]? | select(.level=="warn")] | length' security.json)
          SENSITIVE=$(jq '[.[]? | select((.pg // "") | test("admin|vip"; "i"))] | length' visits.json)
          SUSPECT=$(jq '[.[]? | select((.br // "")=="Other" or (.br // "")=="—")] | length' visits.json)

          THREAT="#22c55e"; THREAT_TXT="LOW"
          if [ "$SEC_WARN" -gt 0 ] || [ "$SENSITIVE" -gt 0 ]; then THREAT="#f59e0b"; THREAT_TXT="ELEVATED"; fi
          if [ "$SEC_WARN" -ge 5 ]; then THREAT="#ef4444"; THREAT_TXT="HIGH"; fi

          tile() { # value label color
            echo "<td align='center' valign='top' style='background:#0f1626;border:1px solid #1e293b;border-radius:10px;padding:14px 8px'><div style='font-size:26px;font-weight:800;color:$3;font-family:Arial,sans-serif'>$1</div><div style='font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-family:Arial,sans-serif;margin-top:4px'>$2</div></td>" >> report.html
          }
          sp() { echo "<td width='10'>&nbsp;</td>" >> report.html; }

          : > report.html
          cat >> report.html <<EOF
          <div style="background:#0b0f1a;padding:24px 0;font-family:Arial,Helvetica,sans-serif">
          <table width="660" cellpadding="0" cellspacing="0" align="center" style="margin:0 auto;background:#131a2a;border-radius:16px;overflow:hidden;border:1px solid #1e293b">
            <tr><td style="background:#4f46e5;padding:22px 26px">
              <div style="font-size:13px;color:#c7d2fe;letter-spacing:1px;font-weight:700">SMC EXAM PREP &bull; SECURITY OPERATIONS</div>
              <div style="font-size:22px;color:#ffffff;font-weight:800;margin-top:4px">🛡 Daily Security &amp; Activity Report</div>
              <div style="font-size:12px;color:#e0e7ff;margin-top:6px">${DATE_IST} IST &nbsp;|&nbsp; Threat level: <span style="background:${THREAT};color:#0b0f1a;font-weight:800;padding:2px 8px;border-radius:6px">${THREAT_TXT}</span></div>
            </td></tr>
            <tr><td style="padding:22px 26px">
          EOF

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:0 0 10px'>📊 Traffic (last 24h &amp; all-time)</div>" >> report.html
          echo "<table width='100%' cellpadding='0' cellspacing='0'><tr>" >> report.html
          tile "$LAST24" "Visits 24h" "#818cf8"; sp
          tile "$TOTAL_VISITS" "Total Visits" "#e5e7eb"; sp
          tile "$TOTAL_CLICKS" "Clicks" "#e5e7eb"; sp
          tile "$UNIQ_DEV" "Unique Devices" "#e5e7eb"; sp
          tile "$MOBILE" "Mobile" "#e5e7eb"
          echo "</tr></table>" >> report.html

          # ---- GOOGLE ANALYTICS PANEL (only if ga.html was produced) ----
          [ -f ga.html ] && cat ga.html >> report.html

          # ---- SECURITY AUDIT PANEL ----
          cat >> report.html <<EOF
          <div style="margin-top:22px;border:1px solid #7f1d1d;border-radius:12px;overflow:hidden">
            <div style="background:#7f1d1d;padding:10px 14px;font-size:13px;color:#fecaca;font-weight:800">🔐 SECURITY AUDIT LOG</div>
            <div style="padding:14px">
            <table width="100%" cellpadding="0" cellspacing="0"><tr>
          EOF
          tile "$SEC_24" "Sec Events 24h" "#fbbf24"; sp
          tile "$SEC_WARN" "Failed / Alerts" "#ef4444"; sp
          tile "$SENSITIVE" "Admin/VIP Hits" "#f59e0b"; sp
          tile "$SUSPECT" "Suspicious UA" "#fbbf24"
          echo "</tr></table>" >> report.html

          echo "<div style='font-size:12px;color:#cbd5e1;font-weight:700;margin:16px 0 6px'>Recent security events</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]?] | sort_by(.time) | reverse | .[:2000][] | [(.localTime // .time // "-"), (.level // "ok"), (.msg // "-"), (.src // "-")] | @tsv' security.json > sec_rows.tsv || true
          if [ -s sec_rows.tsv ]; then
            while IFS=$'\t' read -r t lvl msg src; do
              if [ "$lvl" = "warn" ]; then col="#ef4444"; else col="#22c55e"; fi
              up=$(printf '%s' "$lvl" | tr '[:lower:]' '[:upper:]')
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td><span style="background:%s;color:#0b0f1a;padding:1px 6px;border-radius:5px;font-weight:700;font-size:10px">%s</span></td><td>%s</td><td style="color:#64748b">%s</td></tr>\n' "$t" "$col" "$up" "$msg" "$src" >> report.html
            done < sec_rows.tsv
          else
            echo "<tr><td style='color:#64748b'>No security events recorded in the feed.</td></tr>" >> report.html
          fi
          echo "</table>" >> report.html

          echo "<div style='font-size:12px;color:#cbd5e1;font-weight:700;margin:16px 0 6px'>Admin / VIP page access (sensitive)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]? | select((.pg // "") | test("admin|vip"; "i"))] | sort_by(.t) | reverse | .[:2000][] | [(.lt // .t // "-"), (.pg // "-"), ((.dev // "?")+" / "+(.os // "?")), (.net // "?")] | @tsv' visits.json > srows.tsv || true
          if [ -s srows.tsv ]; then
            while IFS=$'\t' read -r a b c d; do
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td style="color:#f59e0b">%s</td><td>%s</td><td style="color:#64748b">%s</td></tr>\n' "$a" "$b" "$c" "$d" >> report.html
            done < srows.tsv
          else
            echo "<tr><td style='color:#64748b'>No admin/VIP page access in this window.</td></tr>" >> report.html
          fi
          echo "</table></div></div>" >> report.html

          # ---- TRAFFIC DETAIL ---- (all HTML/colour built in bash; jq only emits @tsv data)
          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:22px 0 6px'>🔥 Top pages</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]? | .pg] | map(select(.!=null)) | group_by(.) | map({page:.[0], n:length}) | sort_by(-.n) | .[:1000][] | [.page, (.n|tostring)] | @tsv' visits.json > prows.tsv || true
          while IFS=$'\t' read -r a b; do [ -z "$a" ] && continue
            printf '<tr style="border-bottom:1px solid #1e293b"><td>%s</td><td align="right" style="color:#818cf8;font-weight:700">%s</td></tr>\n' "$a" "$b" >> report.html
          done < prows.tsv
          echo "</table>" >> report.html

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:18px 0 6px'>📱 Top device / OS</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]? | (.dev // "?")+" / "+(.os // "?")] | group_by(.) | map({k:.[0], n:length}) | sort_by(-.n) | .[:1000][] | [.k, (.n|tostring)] | @tsv' visits.json > drows.tsv || true
          while IFS=$'\t' read -r a b; do [ -z "$a" ] && continue
            printf '<tr style="border-bottom:1px solid #1e293b"><td>%s</td><td align="right" style="color:#818cf8;font-weight:700">%s</td></tr>\n' "$a" "$b" >> report.html
          done < drows.tsv
          echo "</table>" >> report.html

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:18px 0 6px'>🕑 All visits (newest first — full log attached as visits.json)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          printf '<tr style="color:#64748b;text-align:left"><th align="left">Time</th><th align="left">Device</th><th align="left">OS / Browser</th><th align="left">Page</th><th align="left">Net</th><th align="left">Referrer</th></tr>\n' >> report.html
          jq -r '[.[]?] | sort_by(.t) | reverse | .[:1000][] | [(.lt // .t // "-"), (.dev // "?"), ((.os // "?")+", "+(.br // "?")), (.pg // "?"), (.net // "?"), (.ref // "Direct")] | @tsv' visits.json > vrows.tsv || true
          while IFS=$'\t' read -r a b c d e f; do
            printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td>%s</td><td style="color:#64748b">%s</td><td>%s</td><td style="color:#64748b">%s</td><td style="color:#64748b">%s</td></tr>\n' "$a" "$b" "$c" "$d" "$e" "$f" >> report.html
          done < vrows.tsv
          echo "</table>" >> report.html

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:18px 0 6px'>🖱 All clicks (newest first — full log attached as clicks.json)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          printf '<tr style="color:#64748b;text-align:left"><th align="left">Time</th><th align="left">Element / Text</th><th align="left">Page</th></tr>\n' >> report.html
          jq -r '[.[]?] | reverse | .[:1000][] | [(.t // "?"), (.x // "?"), (.p // "?")] | @tsv' clicks.json > crows.tsv || true
          while IFS=$'\t' read -r a b c; do
            printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td>%s</td><td style="color:#64748b">%s</td></tr>\n' "$a" "$b" "$c" >> report.html
          done < crows.tsv
          echo "</table>" >> report.html

          if [ "$TOTAL_VISITS" -eq 0 ] && [ "$SEC_TOTAL" -eq 0 ]; then
            if [ -z "$FB_SECRET" ]; then
              echo "<div style='margin-top:18px;background:#422006;border:1px solid #92400e;border-radius:10px;padding:12px;font-size:12px;color:#fde68a'>⚠️ All counts are 0 because the <b>FIREBASE_SECRET</b> repo secret is not set, so this report cannot read your database. Add it to populate real numbers.</div>" >> report.html
            else
              echo "<div style='margin-top:18px;background:#0f1626;border:1px solid #1e293b;border-radius:10px;padding:12px;font-size:12px;color:#94a3b8'>No activity recorded yet in this window.</div>" >> report.html
            fi
          fi

          cat >> report.html <<EOF
            <div style="margin-top:20px;border-top:1px solid #1e293b;padding-top:12px;font-size:11px;color:#64748b">
              Generated automatically by GitHub Actions &bull; Sources: Firebase Realtime DB (visits, clicks, security) + Google Analytics GA4 &bull; SMC Exam Prep SOC
            </div>
            </td></tr>
          </table></div>
          EOF

          echo "Report built. 24h visits: ${LAST24}, total: ${TOTAL_VISITS}, sec events: ${SEC_TOTAL}"
          echo "subject=🛡 SMC Security Report — ${DATE_IST%,*} — ${LAST24} visits, ${SEC_WARN} alerts" >> "$GITHUB_OUTPUT"

      - name: Check email secrets
        id: check
        run: |
          if [ -n "${{ secrets.MAIL_USERNAME }}" ] && [ -n "${{ secrets.MAIL_PASSWORD }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MAIL_USERNAME / MAIL_PASSWORD secrets not set — skipping email. Add them in repo Settings to enable delivery."
          fi

      - name: Send daily email
        if: steps.check.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.report.outputs.subject }}
          to: ${{ env.TO_EMAIL }}
          from: SMC Exam Prep Bot <${{ secrets.MAIL_USERNAME }}>
          html_body: file://report.html
          # Every single record, raw — attached in full
          attachments: visits.json,clicks.json,security.json,report.html
