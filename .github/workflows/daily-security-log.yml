name: Daily Security & Activity Log

# Sends a daily site activity / security summary to the owner's email.
#
# ONE-TIME SETUP (required for the email step to work):
#   In the GitHub repo:  Settings -> Secrets and variables -> Actions -> New repository secret
#     1) MAIL_USERNAME    = the Gmail address you send FROM (e.g. abhiiibabariya@gmail.com)
#     2) MAIL_PASSWORD    = a Gmail "App Password" (NOT your normal password).
#          Create it at: https://myaccount.google.com/apppasswords  (needs 2-Step Verification ON)
#     3) FIREBASE_SECRET  = a Firebase Realtime DB auth token, so the report can READ your data.
#          Get it: Firebase console -> Project Settings -> Service accounts -> Database secrets
#          (or generate a token). Your DB currently blocks anonymous reads (good!), so without
#          this secret the report will show 0 visits.
#   The report is always delivered to: abhiiibabariya@gmail.com (see TO_EMAIL below).
#
#   OPTIONAL (to add a Google Analytics GA4 panel to the email):
#     4) GA_PROPERTY_ID = numeric GA4 property id (GA Admin -> Property Settings -> PROPERTY ID;
#          this is NOT the G-XXXX measurement id).
#     5) GA_SA_KEY       = full JSON of a Google Cloud service-account key that has Viewer access
#          to the GA4 property, with the "Google Analytics Data API" enabled. If either secret is
#          missing the GA section is simply omitted (everything else still works).
#
# Until MAIL_* secrets are added, the workflow still runs and builds the report,
# but the send-email step is skipped (so it won't fail noisily every day).

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 min — near-real-time; email is sent only when there's fresh activity
  workflow_dispatch: {}     # manual run always sends, even with no recent activity

permissions:
  contents: read

env:
  FIREBASE_URL: 'https://smc-exam-prep-38d22-default-rtdb.asia-southeast1.firebasedatabase.app'
  TO_EMAIL: 'abhiiibabariya@gmail.com'

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for GA report script)
        uses: actions/checkout@v4

      - name: Fetch site data from Firebase
        env:
          FB_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          set -e
          AUTH=""
          [ -n "$FB_SECRET" ] && AUTH="?auth=${FB_SECRET}"
          echo "Fetching visits, clicks, leads & security log (auth: $([ -n "$FB_SECRET" ] && echo yes || echo no))..."
          curl -fsS "${FIREBASE_URL}/visits.json${AUTH}"   -o visits.json   || echo 'null' > visits.json
          curl -fsS "${FIREBASE_URL}/clicks.json${AUTH}"   -o clicks.json   || echo 'null' > clicks.json
          curl -fsS "${FIREBASE_URL}/leads.json${AUTH}"    -o leads.json    || echo 'null' > leads.json
          curl -fsS "${FIREBASE_URL}/security.json${AUTH}" -o security.json || echo 'null' > security.json
          curl -fsS "${FIREBASE_URL}/audit.json${AUTH}"    -o audit.json    || echo 'null' > audit.json
          # Normalise empty/null responses to empty objects
          for f in visits.json clicks.json leads.json security.json audit.json; do
            [ -s "$f" ] || echo '{}' > "$f"
            if [ "$(cat "$f")" = "null" ]; then echo '{}' > "$f"; fi
          done

      - name: Fetch Google Analytics (GA4)
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_SA_KEY: ${{ secrets.GA_SA_KEY }}
        run: |
          if [ -z "$GA_PROPERTY_ID" ] || [ -z "$GA_SA_KEY" ]; then
            echo "GA4 secrets (GA_PROPERTY_ID / GA_SA_KEY) not set — skipping Google Analytics section."
            exit 0
          fi
          printf '%s' "$GA_SA_KEY" > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS="$PWD/sa.json"
          python -m pip install --quiet --disable-pip-version-check google-analytics-data
          python .github/scripts/ga_report.py || echo "::warning::GA4 step failed (non-fatal)."
          rm -f sa.json

      - name: Build summary report
        id: report
        env:
          FB_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          set -e
          DATE_IST=$(TZ='Asia/Kolkata' date '+%d %B %Y, %I:%M %p')
          CUTOFF=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%S')
          # Activity window (a hair wider than the 30-min cron so nothing slips through the gap).
          WIN=$(date -u -d '35 minutes ago' '+%Y-%m-%dT%H:%M:%S')

          # ---- Normalise visit records ----
          # The DB holds 3 historic schemas (verbose deviceModel/browser/page/timestamp,
          # compact dev/br/pg/t, and duration-only update beacons). Collapse them all into
          # one canonical shape so every downstream jq just works, drop the update beacons,
          # and resolve a real device label so nothing ever shows as "Unknown".
          jq '[ .[]?
            | select(.update != true)
            | . + {
                t:  (.t // .timestamp // ""),
                lt: (.lt // .localTime // .t // .timestamp // "-"),
                os: (.os // "—"),
                br: (.br // .browser // "—"),
                pg: (.pg // .page // "—"),
                net:(.net // (.connection.type? // null) // "—"),
                ref:(.ref // .referrer // "Direct"),
                mob:(if (.mob != null) then .mob elif (.deviceType != null) then (.deviceType == "Mobile") else false end),
                dev:( (.dev // .deviceModel // "") as $d
                      | if ($d == "" or ($d|ascii_downcase|test("unknown")))
                        then ( if ((.mob == true) or (.deviceType == "Mobile"))
                               then ( if ((.os // "")|test("Android";"i")) then "Android Phone"
                                      elif ((.os // "")|test("iOS|iPhone";"i")) then "iPhone"
                                      else "Mobile Device" end )
                               else ( if ((.os // "")|test("Windows";"i")) then "Windows PC"
                                      elif ((.os // "")|test("Mac";"i")) then "Mac"
                                      elif ((.os // "")|test("Linux";"i")) then "Linux PC"
                                      else "Desktop" end ) end )
                        else $d end )
              } ]' visits.json > visits_norm.json && mv visits_norm.json visits.json

          # ---- Scope EVERYTHING to the last 24h ----
          # This is a DAILY report: it must show only fresh, live activity — never repeat
          # old/all-time data. We build a 24h slice of each dataset once, and every panel
          # below reads the *_24.json slice instead of the full history.
          jq --arg c "$CUTOFF" '[.[]? | select((.t    // "") > $c)]' visits.json   > visits_24.json   || echo '[]' > visits_24.json
          jq --arg c "$CUTOFF" '[.[]? | select((.ts   // .t // "") > $c)]' clicks.json > clicks_24.json || echo '[]' > clicks_24.json
          jq --arg c "$CUTOFF" '[.[]? | select((.t    // "") > $c)]' leads.json    > leads_24.json    || echo '[]' > leads_24.json
          jq --arg c "$CUTOFF" '[.[]? | select((.time // "") > $c)]' security.json > security_24.json || echo '[]' > security_24.json
          jq --arg c "$CUTOFF" '[.[]? | select((.t    // "") > $c)]' audit.json    > audit_24.json    || echo '[]' > audit_24.json

          # ---- Activity metrics (24h / live) ----
          TOTAL_VISITS=$(jq '[.[]?] | length' visits.json)   # all-time — kept ONLY for the "secret missing?" empty-check
          SEC_TOTAL=$(jq '[.[]?] | length' security.json)    #   (same)
          LAST24=$(jq '[.[]?] | length' visits_24.json)
          CLICKS_24=$(jq '[.[]?] | length' clicks_24.json)
          UNIQ_VIS_24=$(jq '[.[]? | (.sid // .dev)] | map(select(.!=null)) | unique | length' visits_24.json)
          MOBILE_24=$(jq '[.[]? | select(.mob==true)] | length' visits_24.json)
          LOGINS_24=$(jq '[.[]? | select(.ev=="login")] | length' audit_24.json)
          LOGOUTS_24=$(jq '[.[]? | select(.ev=="logout")] | length' audit_24.json)

          # ---- Lead / identity metrics (name + mobile captured by the access gate, 24h) ----
          LEADS_24=$(jq '[.[]?] | length' leads_24.json)
          LEADS_UNVERIFIED_24=$(jq '[.[]? | select(.verified != true)] | length' leads_24.json)
          LEADS_VER_WA_24=$(jq '[.[]? | select(.verified==true and (.channel // "")=="whatsapp")] | length' leads_24.json)
          LEADS_VER_EMAIL_24=$(jq '[.[]? | select(.verified==true and (.channel // "")=="email")] | length' leads_24.json)

          # ---- Security metrics (24h) ----
          SEC_24=$(jq '[.[]?] | length' security_24.json)
          SEC_WARN_24=$(jq '[.[]? | select(.level=="warn")] | length' security_24.json)
          SENSITIVE_24=$(jq '[.[]? | select((.pg // "") | test("admin|vip"; "i"))] | length' visits_24.json)
          SUSPECT_24=$(jq '[.[]? | select((.br // "")=="Other" or (.br // "")=="—")] | length' visits_24.json)

          # ---- Audit-trail metrics + fresh-activity gate (decides whether we email) ----
          AUDIT_TOTAL=$(jq '[.[]?] | length' audit.json)
          AUDIT_24=$(jq --arg c "$CUTOFF" '[.[]? | select((.t // "") > $c)] | length' audit.json)
          ACT_RECENT=$(jq --arg c "$WIN" '[.[]? | select((.t // "") > $c)] | length' audit.json)
          VIS_RECENT=$(jq --arg c "$WIN" '[.[]? | select((.t // "") > $c)] | length' visits.json)
          LEAD_RECENT=$(jq --arg c "$WIN" '[.[]? | select((.t // "") > $c)] | length' leads.json)
          HAS_ACTIVITY=false
          if [ "$ACT_RECENT" -gt 0 ] || [ "$VIS_RECENT" -gt 0 ] || [ "$LEAD_RECENT" -gt 0 ]; then HAS_ACTIVITY=true; fi

          THREAT="#22c55e"; THREAT_TXT="LOW"
          if [ "$SEC_WARN_24" -gt 0 ] || [ "$SENSITIVE_24" -gt 0 ]; then THREAT="#f59e0b"; THREAT_TXT="ELEVATED"; fi
          if [ "$SEC_WARN_24" -ge 5 ]; then THREAT="#ef4444"; THREAT_TXT="HIGH"; fi

          tile() { # value label color
            echo "<td align='center' valign='top' style='background:#0f1626;border:1px solid #1e293b;border-radius:10px;padding:14px 8px'><div style='font-size:26px;font-weight:800;color:$3;font-family:Arial,sans-serif'>$1</div><div style='font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-family:Arial,sans-serif;margin-top:4px'>$2</div></td>" >> report.html
          }
          sp() { echo "<td width='10'>&nbsp;</td>" >> report.html; }

          : > report.html
          cat >> report.html <<EOF
          <div style="background:#0b0f1a;padding:24px 0;font-family:Arial,Helvetica,sans-serif">
          <table width="660" cellpadding="0" cellspacing="0" align="center" style="margin:0 auto;background:#131a2a;border-radius:16px;overflow:hidden;border:1px solid #1e293b">
            <tr><td style="background:#4f46e5;padding:22px 26px">
              <div style="font-size:13px;color:#c7d2fe;letter-spacing:1px;font-weight:700">SMC EXAM PREP &bull; SECURITY OPERATIONS</div>
              <div style="font-size:22px;color:#ffffff;font-weight:800;margin-top:4px">🛡 Daily Security &amp; Activity Report</div>
              <div style="font-size:12px;color:#e0e7ff;margin-top:6px">${DATE_IST} IST &nbsp;|&nbsp; Threat level: <span style="background:${THREAT};color:#0b0f1a;font-weight:800;padding:2px 8px;border-radius:6px">${THREAT_TXT}</span></div>
            </td></tr>
            <tr><td style="padding:22px 26px">
          EOF

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:0 0 10px'>📊 Today&rsquo;s activity &mdash; last 24h (live)</div>" >> report.html
          echo "<table width='100%' cellpadding='0' cellspacing='0'><tr>" >> report.html
          tile "$LAST24" "Visits" "#818cf8"; sp
          tile "$UNIQ_VIS_24" "Unique Visitors" "#e5e7eb"; sp
          tile "$CLICKS_24" "Clicks" "#e5e7eb"; sp
          tile "$LOGINS_24" "Logins" "#22c55e"; sp
          tile "$LOGOUTS_24" "Logouts" "#f59e0b"; sp
          tile "$LEADS_24" "New IDs" "#34d399"
          echo "</tr></table>" >> report.html

          # ---- PER-VISITOR AUDIT TRAIL (the headline: who did what, in order) ----
          # Every audit event (/audit) is stamped with a stable visitor id (sid) plus
          # the logged-in name/mobile, so we can stitch each person's whole journey —
          # login → each page opened → every click → logout — into one timeline.
          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:22px 0 8px'>👣 Per-visitor audit trail — last 24h ($AUDIT_24 events, newest session first)</div>" >> report.html
          jq -r --arg c "$CUTOFF" '
            [ .[]? | select((.t // "") > $c) ]
            | map(. + {sidk:(.sid // "nosid")})
            | group_by(.sidk)
            | map({ sidk:.[0].sidk,
                    name:( [ .[] | (.name // "") | select(. != "") ] | last ),
                    mobile:( [ .[] | (.mobile // "") | select(. != "") ] | last ),
                    last:( [ .[] | .t ] | max ),
                    evs:( sort_by(.t) ) })
            | sort_by(.last) | reverse
            | .[]
            | ( "H\t" + ((.name // "") | if . == "" then "Anonymous visitor" else . end) + "\t" + (.mobile // "") + "\t" + (.sidk) + "\t" + ((.evs|length)|tostring) ),
              ( .evs[] | "E\t" + (.lt // .t // "-") + "\t" + (.ev // "-") + "\t" + ((.d // "") | gsub("[\t\n]";" ")) + "\t" + (.pg // "-") )
          ' audit.json > trail.tsv || true
          if [ -s trail.tsv ]; then
            open=0
            while IFS=$'\t' read -r typ a b c d; do
              if [ "$typ" = "H" ]; then
                [ "$open" = "1" ] && echo "</table></div>" >> report.html
                mob=""; [ -n "$b" ] && mob=" &middot; <span style='color:#34d399;font-weight:700'>+91 $b</span>"
                printf '<div style="margin:10px 0;border:1px solid #1e293b;border-radius:10px;overflow:hidden"><div style="background:#0f1626;padding:9px 12px;font-size:12px;color:#fafafa;font-weight:700">👤 %s%s <span style="color:#64748b;font-weight:400">&middot; %s events &middot; %s</span></div><table width="100%%" cellpadding="5" cellspacing="0" style="border-collapse:collapse;font-size:12px;color:#cbd5e1">\n' "$a" "$mob" "$d" "$c" >> report.html
                open=1
              else
                case "$b" in
                  login) icon="🔓"; ecol="#22c55e";;
                  logout) icon="🚪"; ecol="#f59e0b";;
                  page_view) icon="📄"; ecol="#818cf8";;
                  click) icon="🖱"; ecol="#94a3b8";;
                  *) icon="•"; ecol="#94a3b8";;
                esac
                printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap;width:150px">%s</td><td style="color:%s;white-space:nowrap;width:90px">%s %s</td><td style="color:#e5e7eb">%s</td><td style="color:#64748b">%s</td></tr>\n' "$a" "$ecol" "$icon" "$b" "$c" "$d" >> report.html
              fi
            done < trail.tsv
            [ "$open" = "1" ] && echo "</table></div>" >> report.html
          else
            echo "<div style='background:#0f1626;border:1px solid #1e293b;border-radius:10px;padding:12px;font-size:12px;color:#94a3b8'>No audit events in the last 24h yet. Each login, page view &amp; click will appear here, grouped by visitor.</div>" >> report.html
          fi

          # ---- GOOGLE ANALYTICS PANEL (only if ga.html was produced) ----
          [ -f ga.html ] && cat ga.html >> report.html

          # ---- SECURITY AUDIT PANEL ----
          cat >> report.html <<EOF
          <div style="margin-top:22px;border:1px solid #7f1d1d;border-radius:12px;overflow:hidden">
            <div style="background:#7f1d1d;padding:10px 14px;font-size:13px;color:#fecaca;font-weight:800">🔐 SECURITY AUDIT LOG</div>
            <div style="padding:14px">
            <table width="100%" cellpadding="0" cellspacing="0"><tr>
          EOF
          tile "$SEC_24" "Sec Events 24h" "#fbbf24"; sp
          tile "$SEC_WARN_24" "Failed / Alerts" "#ef4444"; sp
          tile "$SENSITIVE_24" "Admin/VIP Hits" "#f59e0b"; sp
          tile "$SUSPECT_24" "Suspicious UA" "#fbbf24"
          echo "</tr></table>" >> report.html

          echo "<div style='font-size:12px;color:#cbd5e1;font-weight:700;margin:16px 0 6px'>Security events (last 24h)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]?] | sort_by(.time) | reverse | .[:2000][] | [(.localTime // .time // "-"), (.level // "ok"), (.msg // "-"), (.src // "-")] | @tsv' security_24.json > sec_rows.tsv || true
          if [ -s sec_rows.tsv ]; then
            while IFS=$'\t' read -r t lvl msg src; do
              if [ "$lvl" = "warn" ]; then col="#ef4444"; else col="#22c55e"; fi
              up=$(printf '%s' "$lvl" | tr '[:lower:]' '[:upper:]')
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td><span style="background:%s;color:#0b0f1a;padding:1px 6px;border-radius:5px;font-weight:700;font-size:10px">%s</span></td><td>%s</td><td style="color:#64748b">%s</td></tr>\n' "$t" "$col" "$up" "$msg" "$src" >> report.html
            done < sec_rows.tsv
          else
            echo "<tr><td style='color:#64748b'>No security events in the last 24h.</td></tr>" >> report.html
          fi
          echo "</table>" >> report.html

          echo "<div style='font-size:12px;color:#cbd5e1;font-weight:700;margin:16px 0 6px'>Admin / VIP page access (last 24h, sensitive)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]? | select((.pg // "") | test("admin|vip"; "i"))] | sort_by(.t) | reverse | .[:2000][] | [(.lt // .t // "-"), (.pg // "-"), ((.dev // "?")+" / "+(.os // "?")), (.net // "?")] | @tsv' visits_24.json > srows.tsv || true
          if [ -s srows.tsv ]; then
            while IFS=$'\t' read -r a b c d; do
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td style="color:#f59e0b">%s</td><td>%s</td><td style="color:#64748b">%s</td></tr>\n' "$a" "$b" "$c" "$d" >> report.html
            done < srows.tsv
          else
            echo "<tr><td style='color:#64748b'>No admin/VIP page access in the last 24h.</td></tr>" >> report.html
          fi
          echo "</table></div></div>" >> report.html

          # ---- VISITOR IDENTITY PANEL (name + mobile captured by the access gate) ----
          cat >> report.html <<EOF
          <div style="margin-top:22px;border:1px solid #065f46;border-radius:12px;overflow:hidden">
            <div style="background:#065f46;padding:10px 14px;font-size:13px;color:#d1fae5;font-weight:800">👤 NEW VISITOR IDENTITIES (last 24h) &mdash; Name, Mobile &amp; Chosen Post</div>
            <div style="padding:14px">
            <table width="100%" cellpadding="0" cellspacing="0"><tr>
          EOF
          tile "$LEADS_24" "New IDs 24h" "#34d399"; sp
          tile "$LEADS_VER_WA_24" "✅ WhatsApp" "#22c55e"; sp
          tile "$LEADS_VER_EMAIL_24" "✅ Email" "#60a5fa"; sp
          tile "$LEADS_UNVERIFIED_24" "Unverified" "#fbbf24"
          echo "</tr></table>" >> report.html

          echo "<div style='font-size:12px;color:#cbd5e1;font-weight:700;margin:16px 0 6px'>Identities captured in the last 24h (newest first)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          printf '<tr style="color:#64748b;text-align:left"><th align="left">Time (IST)</th><th align="left">Name</th><th align="left">Mobile</th><th align="left">Post / Subject</th><th align="left">Verification</th><th align="left">Page</th></tr>\n' >> report.html
          jq -r '[.[]?] | sort_by(.t) | reverse | .[:2000][] | [(.lt // .t // "-"), (.name // "—"), (.mobile // "—"), (.postLabel // .email // "—"), (if .verified==true then "verified" else "unverified" end), (.channel // "none"), (.pg // "-")] | @tsv' leads_24.json > lrows.tsv || true
          if [ -s lrows.tsv ]; then
            while IFS=$'\t' read -r t nm mb em st ch pg; do
              if [ "$st" = "verified" ]; then bg="#22c55e"; up="VERIFIED"; else bg="#f59e0b"; up="UNVERIFIED"; fi
              case "$ch" in whatsapp) via=" · WhatsApp";; email) via=" · Email";; *) via="";; esac
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td style="color:#fafafa;font-weight:700">%s</td><td style="color:#34d399;font-weight:700;white-space:nowrap">+91 %s</td><td style="color:#cbd5e1">%s</td><td><span style="background:%s;color:#0b0f1a;padding:1px 6px;border-radius:5px;font-weight:700;font-size:10px">%s</span><span style="color:#64748b;font-size:10px">%s</span></td><td>%s</td></tr>\n' "$t" "$nm" "$mb" "$em" "$bg" "$up" "$via" "$pg" >> report.html
            done < lrows.tsv
          else
            echo "<tr><td style='color:#64748b'>No visitor identities captured yet. They appear here once the access gate records a name + mobile.</td></tr>" >> report.html
          fi
          echo "</table></div></div>" >> report.html

          # ---- POST / SUBJECT INTEREST (24h) — which line aspirants chose in the gate ----
          cat >> report.html <<EOF
          <div style="margin-top:22px;border:1px solid #3730a3;border-radius:12px;overflow:hidden">
            <div style="background:#3730a3;padding:10px 14px;font-size:13px;color:#c7d2fe;font-weight:800">🎯 POST / SUBJECT INTEREST (last 24h)</div>
            <div style="padding:14px">
          EOF
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]? | (.postLabel // "") | select(. != "")] | group_by(.) | map({k:.[0], n:length}) | sort_by(-.n) | .[:100][] | [.k, (.n|tostring)] | @tsv' leads_24.json > postrows.tsv || true
          if [ -s postrows.tsv ]; then
            PMAX=$(awk -F'\t' 'NR==1{print $2}' postrows.tsv); [ -z "$PMAX" ] && PMAX=1; [ "$PMAX" -lt 1 ] && PMAX=1
            while IFS=$'\t' read -r a b; do [ -z "$a" ] && continue
              W=$(( b * 100 / PMAX )); [ "$W" -lt 6 ] && W=6
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#e5e7eb;white-space:nowrap;width:210px">%s</td><td><div style="background:#4f46e5;height:9px;border-radius:5px;width:%s%%"></div></td><td align="right" style="color:#a5b4fc;font-weight:700;width:34px">%s</td></tr>\n' "$a" "$W" "$b" >> report.html
            done < postrows.tsv
          else
            echo "<tr><td style='color:#64748b'>No post/subject selected via the gate in the last 24h.</td></tr>" >> report.html
          fi
          echo "</table></div></div>" >> report.html

          # ---- TRAFFIC DETAIL (24h / live only) ---- (HTML/colour built in bash; jq emits @tsv)
          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:22px 0 6px'>🔥 Most-visited pages (last 24h)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]? | .pg] | map(select(.!=null and .!="—")) | group_by(.) | map({page:.[0], n:length}) | sort_by(-.n) | .[:30][] | [.page, (.n|tostring)] | @tsv' visits_24.json > prows.tsv || true
          if [ -s prows.tsv ]; then
            VMAX=$(awk -F'\t' 'NR==1{print $2}' prows.tsv); [ -z "$VMAX" ] && VMAX=1; [ "$VMAX" -lt 1 ] && VMAX=1
            while IFS=$'\t' read -r a b; do [ -z "$a" ] && continue
              W=$(( b * 100 / VMAX )); [ "$W" -lt 6 ] && W=6
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#e5e7eb;white-space:nowrap;width:230px">%s</td><td><div style="background:#818cf8;height:9px;border-radius:5px;width:%s%%"></div></td><td align="right" style="color:#818cf8;font-weight:700;width:34px">%s</td></tr>\n' "$a" "$W" "$b" >> report.html
            done < prows.tsv
          else
            echo "<tr><td style='color:#64748b'>No page views in the last 24h.</td></tr>" >> report.html
          fi
          echo "</table>" >> report.html

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:18px 0 6px'>📱 Top device / OS (last 24h)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          jq -r '[.[]? | (.dev // "?")+" / "+(.os // "?")] | group_by(.) | map({k:.[0], n:length}) | sort_by(-.n) | .[:30][] | [.k, (.n|tostring)] | @tsv' visits_24.json > drows.tsv || true
          if [ -s drows.tsv ]; then
            while IFS=$'\t' read -r a b; do [ -z "$a" ] && continue
              printf '<tr style="border-bottom:1px solid #1e293b"><td>%s</td><td align="right" style="color:#818cf8;font-weight:700">%s</td></tr>\n' "$a" "$b" >> report.html
            done < drows.tsv
          else
            echo "<tr><td style='color:#64748b'>No device data in the last 24h.</td></tr>" >> report.html
          fi
          echo "</table>" >> report.html

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:18px 0 6px'>🕑 Visits (last 24h, newest first)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          printf '<tr style="color:#64748b;text-align:left"><th align="left">Time</th><th align="left">Device</th><th align="left">OS / Browser</th><th align="left">Page</th><th align="left">Net</th><th align="left">Referrer</th></tr>\n' >> report.html
          jq -r '[.[]?] | sort_by(.t) | reverse | .[:1000][] | [(.lt // .t // "-"), (.dev // "?"), ((.os // "?")+", "+(.br // "?")), (.pg // "?"), (.net // "?"), (.ref // "Direct")] | @tsv' visits_24.json > vrows.tsv || true
          if [ -s vrows.tsv ]; then
            while IFS=$'\t' read -r a b c d e f; do
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td>%s</td><td style="color:#64748b">%s</td><td>%s</td><td style="color:#64748b">%s</td><td style="color:#64748b">%s</td></tr>\n' "$a" "$b" "$c" "$d" "$e" "$f" >> report.html
            done < vrows.tsv
          else
            echo "<tr><td style='color:#64748b'>No visits in the last 24h.</td></tr>" >> report.html
          fi
          echo "</table>" >> report.html

          echo "<div style='font-size:13px;color:#e5e7eb;font-weight:700;margin:18px 0 6px'>🖱 Clicks (last 24h, newest first)</div>" >> report.html
          echo "<table width='100%' cellpadding='6' cellspacing='0' style='border-collapse:collapse;font-size:12px;color:#cbd5e1'>" >> report.html
          printf '<tr style="color:#64748b;text-align:left"><th align="left">Time</th><th align="left">Element / Text</th><th align="left">Page</th></tr>\n' >> report.html
          jq -r '[.[]?] | sort_by(.ts // "") | reverse | .[:1000][] | [(.t // "?"), (.x // "?"), (.p // "?")] | @tsv' clicks_24.json > crows.tsv || true
          if [ -s crows.tsv ]; then
            while IFS=$'\t' read -r a b c; do
              printf '<tr style="border-bottom:1px solid #1e293b"><td style="color:#94a3b8;white-space:nowrap">%s</td><td>%s</td><td style="color:#64748b">%s</td></tr>\n' "$a" "$b" "$c" >> report.html
            done < crows.tsv
          else
            echo "<tr><td style='color:#64748b'>No clicks in the last 24h.</td></tr>" >> report.html
          fi
          echo "</table>" >> report.html

          if [ "$TOTAL_VISITS" -eq 0 ] && [ "$SEC_TOTAL" -eq 0 ]; then
            if [ -z "$FB_SECRET" ]; then
              echo "<div style='margin-top:18px;background:#422006;border:1px solid #92400e;border-radius:10px;padding:12px;font-size:12px;color:#fde68a'>⚠️ All counts are 0 because the <b>FIREBASE_SECRET</b> repo secret is not set, so this report cannot read your database. Add it to populate real numbers.</div>" >> report.html
            else
              echo "<div style='margin-top:18px;background:#0f1626;border:1px solid #1e293b;border-radius:10px;padding:12px;font-size:12px;color:#94a3b8'>No activity recorded yet in this window.</div>" >> report.html
            fi
          fi

          cat >> report.html <<EOF
            <div style="margin-top:20px;border-top:1px solid #1e293b;padding-top:12px;font-size:11px;color:#64748b">
              Generated automatically by GitHub Actions &bull; Sources: Firebase Realtime DB (visits, clicks, leads, security) + Google Analytics GA4 &bull; SMC Exam Prep SOC
            </div>
            </td></tr>
          </table></div>
          EOF

          echo "Report built. 24h visits: ${LAST24}, total: ${TOTAL_VISITS}, sec events: ${SEC_TOTAL}, audit 24h: ${AUDIT_24}, fresh activity: ${HAS_ACTIVITY}"
          echo "has_activity=${HAS_ACTIVITY}" >> "$GITHUB_OUTPUT"
          echo "subject=🛡 SMC Activity — ${DATE_IST} IST — ${LAST24} visits, ${LEADS_24} new IDs, ${AUDIT_24} actions, ${SEC_WARN_24} alerts" >> "$GITHUB_OUTPUT"

      - name: Check email secrets
        id: check
        run: |
          if [ -n "${{ secrets.MAIL_USERNAME }}" ] && [ -n "${{ secrets.MAIL_PASSWORD }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MAIL_USERNAME / MAIL_PASSWORD secrets not set — skipping email. Add them in repo Settings to enable delivery."
          fi

      - name: Send activity email
        # Send only when the mail secrets are set AND (there was fresh activity in the
        # last ~35 min, OR this was a manual run). Prevents empty mails every 30 min.
        if: >-
          steps.check.outputs.ready == 'true' &&
          (steps.report.outputs.has_activity == 'true' || github.event_name == 'workflow_dispatch')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.report.outputs.subject }}
          to: ${{ env.TO_EMAIL }}
          from: SMC Exam Prep Bot <${{ secrets.MAIL_USERNAME }}>
          html_body: file://report.html
          # Only the last-24h slice attached — this is a DAILY report, so no old data.
          attachments: visits_24.json,clicks_24.json,leads_24.json,security_24.json,audit_24.json,report.html
